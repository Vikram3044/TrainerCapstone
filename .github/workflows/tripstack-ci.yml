name: TripStack CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: tripstack-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-tests:
    name: Playwright UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: playwrightUI/package-lock.json

      - name: Install Dependencies
        working-directory: playwrightUI
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        working-directory: playwrightUI
        env:
          CI: true
          TRIPSTACK_BASE_URL: https://tripstack.doomple.com
          TRIPSTACK_EMAIL: ${{ secrets.TRIPSTACK_EMAIL }}
          TRIPSTACK_PASSWORD: ${{ secrets.TRIPSTACK_PASSWORD }}
        run: |
          npx playwright test \
          tests/booking-flow.spec.ts \
          tests/login.spec.ts \
          tests/negative-flow.spec.ts \
          --project=chromium

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwrightUI/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright Traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: playwrightUI/test-results
          if-no-files-found: ignore

      - name: Upload UI Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-results
          path: playwrightUI/allure-results
          if-no-files-found: ignore

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run API Tests
        working-directory: APITesting
        env:
          TRIPSTACK_BASE_URL: https://tripstack.doomple.com
          TRIPSTACK_EMAIL: ${{ secrets.TRIPSTACK_EMAIL }}
          TRIPSTACK_PASSWORD: ${{ secrets.TRIPSTACK_PASSWORD }}
        run: |
          mvn -B clean test

      - name: Upload API Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results
          path: APITesting/target/allure-results
          if-no-files-found: ignore

      - name: Upload API Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-report
          path: APITesting/target/allure-report
          if-no-files-found: ignore

  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      - ui-tests
      - api-tests
    if: always()

    steps:
      - name: Verify Jobs
        run: |
          echo "UI Result  : ${{ needs.ui-tests.result }}"
          echo "API Result : ${{ needs.api-tests.result }}"

          if [[ "${{ needs.ui-tests.result }}" != "success" || "${{ needs.api-tests.result }}" != "success" ]]; then
            echo "❌ One or more required jobs failed."
            exit 1
          fi

          echo "✅ All required jobs passed."

  deploy-pages:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: gate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare GitHub Pages Site
        run: |
          mkdir -p site

          if [ -d artifacts/api-allure-report ]; then
            cp -R artifacts/api-allure-report/* site/
          fi

          if [ -d artifacts/ui-allure-results ]; then
            mkdir -p site/ui
            cp -R artifacts/ui-allure-results/* site/ui/
          fi

          ls -R site

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Display Report URL
        run: |
          echo ""
          echo "==========================================="
          echo "GitHub Pages URL"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "==========================================="