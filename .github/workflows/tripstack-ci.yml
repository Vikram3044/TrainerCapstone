name: TripStack CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: tripstack-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: playwrightUI/package-lock.json
      - name: Install Playwright dependencies
        working-directory: playwrightUI
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright smoke suite
        working-directory: playwrightUI
        env:
          CI: true
          TRIPSTACK_BASE_URL: https://tripstack.doomple.com
          TRIPSTACK_EMAIL: ${{ secrets.TRIPSTACK_EMAIL }}
          TRIPSTACK_PASSWORD: ${{ secrets.TRIPSTACK_PASSWORD }}
        run: npx playwright test tests/booking-flow.spec.ts tests/login.spec.ts tests/negative-flow.spec.ts --project=chromium
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwrightUI/playwright-report/
          if-no-files-found: ignore
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: playwrightUI/test-results/
          if-no-files-found: ignore
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-results
          path: playwrightUI/allure-results/
          if-no-files-found: ignore

  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run API, DB, and security tests
        working-directory: APITesting
        env:
          TRIPSTACK_BASE_URL: https://tripstack.doomple.com
          TRIPSTACK_EMAIL: ${{ secrets.TRIPSTACK_EMAIL }}
          TRIPSTACK_PASSWORD: ${{ secrets.TRIPSTACK_PASSWORD }}
        run: mvn -B test -DskipITs
      - name: Upload API Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results
          path: APITesting/target/allure-results/
          if-no-files-found: ignore
      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-report
          path: APITesting/target/allure-report/
          if-no-files-found: ignore

  gate:
    runs-on: ubuntu-latest
    needs: [ui-tests, api-tests]
    if: always()
    steps:
      - name: Fail if either job failed
        run: |
          if [[ "${{ needs.ui-tests.result }}" != "success" || "${{ needs.api-tests.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi

  deploy-pages:
    runs-on: ubuntu-latest
    needs: [gate]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Download Allure artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare GitHub Pages bundle
        run: |
          mkdir -p site
          if [ -d artifacts/api-allure-report ]; then cp -R artifacts/api-allure-report/* site/; fi
          if [ -d artifacts/ui-allure-results ]; then mkdir -p site/ui; cp -R artifacts/ui-allure-results site/ui/; fi
          echo '<!doctype html><html><body><h1>TripStack Test Reports</h1><p>See the uploaded artifacts in Actions.</p></body></html>' > site/index.html
      - name: Configure GitHub Pages
        id: configure-pages
        continue-on-error: true
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload Pages artifact
        if: steps.configure-pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.configure-pages.outcome == 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Report link
        if: always()
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          REPORT_URL="https://${OWNER}.github.io/${REPO_NAME}/"

          if [[ "${{ steps.deployment.outcome }}" == "success" ]]; then
            echo "✅ GitHub Pages deployment completed"
            echo "📊 Report: ${REPORT_URL}"
            echo "📊 Report: [Open TripStack report](${REPORT_URL})" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ GitHub Pages deployment could not be completed."
            echo "Please enable GitHub Pages in the repository settings or grant the workflow the required Pages permissions."
            echo "📌 Repository settings: https://github.com/${OWNER}/${REPO_NAME}/settings/pages" >> "$GITHUB_STEP_SUMMARY"
          fi
